name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 0.2.0"
        required: true
        type: string
      build:
        description: "Bundle build number. Defaults to the GitHub run number."
        required: false
        type: string
      release_notes:
        description: "Detailed Markdown release description. Do not use the default generated GitHub notes."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build And Publish Release
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          build="${{ inputs.build }}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be semantic, for example 0.2.0" >&2
            exit 1
          fi
          if [[ -z "$build" ]]; then
            build="${GITHUB_RUN_NUMBER}"
          fi
          if [[ ! "$build" =~ ^[0-9]+$ ]]; then
            echo "Build must be a positive integer" >&2
            exit 1
          fi
          if git rev-parse "v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists" >&2
            exit 1
          fi
          {
            printf 'RELEASE_VERSION=%s\n' "${version}"
            printf 'RELEASE_BUILD=%s\n' "${build}"
            printf 'RELEASE_TAG=v%s\n' "${version}"
            printf 'RELEASE_ARCHIVE=OpenNOW-%s-macOS.zip\n' "${version}"
          } >> "$GITHUB_ENV"

      - name: Validate release notes
        shell: bash
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_NOTES//[[:space:]]/}" ]]; then
            echo "Release notes are required" >&2
            exit 1
          fi
          if [[ "${RELEASE_NOTES}" == *"Automatically generated release notes"* ]]; then
            echo "Release notes must be a custom description, not GitHub's generated default" >&2
            exit 1
          fi
          if (( ${#RELEASE_NOTES} < 80 )); then
            echo "Release notes must be at least 80 characters and describe the release in detail" >&2
            exit 1
          fi
          printf '%s\n' "${RELEASE_NOTES}" > RELEASE_NOTES.md

      - name: Bump bundle version
        shell: bash
        run: |
          set -euo pipefail
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${RELEASE_VERSION}" OpenNOW-Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${RELEASE_BUILD}" OpenNOW-Info.plist

      - name: Build release binary
        shell: bash
        run: make clean all OPTFLAGS="-O3 -DNDEBUG" ARCHFLAGS="-arch arm64"

      - name: Package app bundle
        shell: bash
        run: |
          set -euo pipefail
          app_path="dist/OpenNOW.app"
          rm -rf dist
          mkdir -p "${app_path}/Contents/MacOS" "${app_path}/Contents/Frameworks" "${app_path}/Contents/Resources"
          cp OpenNOW-Info.plist "${app_path}/Contents/Info.plist"
          cp build/OpenNOW "${app_path}/Contents/MacOS/OpenNOW"
          cp assets/logo.png "${app_path}/Contents/Resources/logo.png"
          cp assets/logo-mac.png "${app_path}/Contents/Resources/logo-mac.png"
          cp assets/OpenNOW-GFNGreen.icns "${app_path}/Contents/Resources/OpenNOW-GFNGreen.icns"
          cp assets/OpenNOW-SkyBlue.icns "${app_path}/Contents/Resources/OpenNOW-SkyBlue.icns"
          iconset_path="dist/logo-mac.iconset"
          mkdir -p "${iconset_path}"
          sips -z 16 16 assets/logo-mac.png --out "${iconset_path}/icon_16x16.png"
          sips -z 32 32 assets/logo-mac.png --out "${iconset_path}/icon_16x16@2x.png"
          sips -z 32 32 assets/logo-mac.png --out "${iconset_path}/icon_32x32.png"
          sips -z 64 64 assets/logo-mac.png --out "${iconset_path}/icon_32x32@2x.png"
          sips -z 128 128 assets/logo-mac.png --out "${iconset_path}/icon_128x128.png"
          sips -z 256 256 assets/logo-mac.png --out "${iconset_path}/icon_128x128@2x.png"
          sips -z 256 256 assets/logo-mac.png --out "${iconset_path}/icon_256x256.png"
          sips -z 512 512 assets/logo-mac.png --out "${iconset_path}/icon_256x256@2x.png"
          sips -z 512 512 assets/logo-mac.png --out "${iconset_path}/icon_512x512.png"
          cp assets/logo-mac.png "${iconset_path}/icon_512x512@2x.png"
          iconutil -c icns "${iconset_path}" -o "${app_path}/Contents/Resources/logo-mac.icns"
          chmod +x "${app_path}/Contents/MacOS/OpenNOW"
          if [[ -d third_party/webrtc-official/WebRTC.framework ]]; then
            cp -R third_party/webrtc-official/WebRTC.framework "${app_path}/Contents/Frameworks/WebRTC.framework"
          elif [[ -d third_party/webrtc-official/WebRTC.xcframework/macos-x86_64_arm64/WebRTC.framework ]]; then
            cp -R third_party/webrtc-official/WebRTC.xcframework/macos-x86_64_arm64/WebRTC.framework "${app_path}/Contents/Frameworks/WebRTC.framework"
          fi
          if [[ -f third_party/sentry-native/install/lib/libsentry.dylib ]]; then
            cp third_party/sentry-native/install/lib/libsentry.dylib "${app_path}/Contents/Frameworks/libsentry.dylib"
          fi
          codesign --force --deep --sign - "${app_path}"
          python3 - "${app_path}/Contents" <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          contents = Path(sys.argv[1])
          frameworks = contents / 'Frameworks'
          binary = contents / 'MacOS/OpenNOW'
          files = [binary] + sorted(frameworks.glob('*.dylib'))
          webrtc_binary = frameworks / 'WebRTC.framework/WebRTC'
          if webrtc_binary.exists():
              files.append(webrtc_binary)

          missing = []
          for file in files:
              output = subprocess.check_output(['otool', '-L', str(file)], text=True, stderr=subprocess.DEVNULL)
              for line in output.splitlines()[1:]:
                  dep = line.strip().split(' ', 1)[0]
                  if not dep.startswith('@rpath/'):
                      continue
                  name = dep[len('@rpath/'):]
                  if name == 'WebRTC.framework/WebRTC':
                      exists = (frameworks / name).exists()
                  else:
                      exists = (frameworks / Path(name).name).exists()
                  if not exists:
                      missing.append((str(file), dep))
          if missing:
              for file, dep in missing[:50]:
                  print(f'{file}: {dep}')
              raise SystemExit(f'{len(missing)} missing bundled @rpath dependencies')
          PY
          ditto -c -k --keepParent "${app_path}" "dist/${RELEASE_ARCHIVE}"

      - name: Commit version bump and tag
        shell: bash
        run: |
          set -euo pipefail
          export GIT_AUTHOR_NAME="github-actions[bot]"
          export GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          export GIT_COMMITTER_NAME="github-actions[bot]"
          export GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          git add OpenNOW-Info.plist
          git commit -m "chore: release ${RELEASE_TAG}"
          git tag -a "${RELEASE_TAG}" -m "OpenNOW ${RELEASE_TAG}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${RELEASE_TAG}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OpenNOW ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.md
          files: dist/${{ env.RELEASE_ARCHIVE }}
