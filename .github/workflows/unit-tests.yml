name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  packages:
    name: Build and Test Packages
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          echo "Using macOS runner"
          uname -a
          swift --version
          xcodebuild -version
        shell: bash

      - name: Cache SwiftPM build graph
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved', '**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Build package workspace
        run: |
          set -euo pipefail
          swift build
        shell: bash

      - name: Run package unit tests
        run: |
          set -euo pipefail
          packages=(
            GFN.CloudMatch
            GFN.GDN
            GFN.Jarvis
            GFN.LCARS
            GFN.NesAuth
            GFN.NetworkTest
            GFN.Ragnarok
            GFN.Starfleet
            GFN.UDS
            OPN.Common
            OPN.GameServices
            OPN.Telemetry
            OPN.Twitch
            OPN.WebRTC.Media
          )

          for package in "${packages[@]}"; do
            echo "::group::swift test --package-path ${package}"
            swift test --package-path "${package}" --scratch-path .build/package-tests
            echo "::endgroup::"
          done
        shell: bash

  app-build:
    name: Build macOS App
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          echo "Using macOS runner"
          uname -a
          swift --version
          xcodebuild -version
        shell: bash

      - name: Build OpenNOW
        run: |
          set -euo pipefail
          xcodebuild build \
            -project OpenNOW.xcodeproj \
            -scheme OpenNOW \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
        shell: bash
